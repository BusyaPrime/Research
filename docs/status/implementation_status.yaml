ten_out_of_ten_open_gaps:
  - orchestration brain уже вынесен из `pipeline/runtime.py`, но `runtime_research.py` еще можно резать дальше на более мелкие research handlers.
  - Property-style randomized coverage уже есть, но mutation testing и более широкий генеративный слой еще не дожаты.
  - Execution/capacity слой честный, но его можно сделать еще злее по halted/no-open/liquidity-cliff сценариям.
  - Model layer уже сильнее baseline, но не дотягивается до максимально взрослого external GBDT/ranking zoo.
  - Gold lineage уже content-addressed и verifier его перепроверяет по contents/schema/profile/file hash, но end-to-end immutable replay по всем слоям еще можно сделать жестче.
