  inputs:
  - close
  notes: Momentum без последнего дня, чтобы отделить эффект short-term reversal.
mom_10_ex1:
  family: returns
  formula: mom_10_ex1(t) = close_(t-1) / close_(t-11) - 1
  inputs:
  - close
