baseline_models:
- random_score
- heuristic_reversal_score
- heuristic_momentum_score
- heuristic_blend_score
- ridge_regression
- lasso_regression
advanced_models:
- elastic_net_regression
- rank_ridge_regression
- gradient_boosting_regressor
- gradient_boosting_ranker
model_tiers:
  tier_0:
  - random_score
  - heuristic_reversal_score
  - heuristic_momentum_score
  - heuristic_blend_score
  - ridge_regression
  - lasso_regression
  tier_1:
  - elastic_net_regression
  - rank_ridge_regression
  - gradient_boosting_regressor
  - gradient_boosting_ranker
  tier_2:
  - experimental_sparse_group_placeholder
tuning:
  engine: optuna_or_internal_search
  n_trials_default: 50
  early_stopping_enabled: true
  optimize_metric: validation_rank_ic_mean
sample_weights:
  enabled: true
  policy: optional_inverse_vol_or_liquidity_capped
