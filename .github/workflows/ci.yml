name: ci

on:
  push:
  pull_request:

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock -r requirements-dev.lock
      - name: Ruff
        run: python -m ruff check src tests
      - name: Mypy
        run: python -m mypy src/alpha_research

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock -r requirements-dev.lock
      - name: Unit tests
        run: python -m pytest tests/unit
      - name: Integration tests
        run: python -m pytest tests/integration
      - name: Leakage tests
        run: python -m pytest tests/leakage
      - name: Spec coverage consistency
        run: python -m pytest tests/integration/test_spec_coverage_map.py tests/integration/test_status_audit_artifacts.py
      - name: Acceptance to tests consistency
        run: python -m pytest tests/integration/test_acceptance_contracts.py

  configured-local-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock -r requirements-dev.lock
      - name: Configured local smoke
        run: python ./scripts/run_release_smoke.py --root . --mode configured-local
      - name: Verify release bundle
        run: python ./scripts/verify_release_bundle.py --root .
